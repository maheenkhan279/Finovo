{% extends "base.html" %}

{% block title %}Needs vs Wants Quiz - Finovo{% endblock %}

{% block content %}
<div style="max-width: 900px; margin: 2rem auto; padding: 2rem;">
    <div style="background: var(--white); padding: 2rem; border-radius: 10px; box-shadow: var(--shadow);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary-blue);">Needs vs Wants Quiz</h2>
            <span style="background: var(--light-bg); padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600;">
                Question {{ question_num }} of {{ total_questions }}
            </span>
        </div>
        
        <div style="background: var(--light-bg); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
            <h3 style="color: var(--dark-gray); margin-bottom: 1rem; font-size: 1.3rem;">{{ question.question }}</h3>
        </div>
        
        <form method="POST" action="{{ url_for('beginner_bp.submit_answer', question_id=question.id) }}">
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                {% for option in question.options %}
                <label style="display: flex; align-items: center; padding: 1rem; background: var(--light-bg); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent;">
                    <input type="radio" name="answer" value="{{ option }}" required style="margin-right: 1rem; width: 20px; height: 20px; cursor: pointer;">
                    <span style="font-size: 1.1rem; color: var(--text-color);">{{ option }}</span>
                </label>
                {% endfor %}
            </div>
            
            <div style="margin-top: 2rem; text-align: center;">
                <button type="submit" style="background: var(--primary-blue); color: var(--white); padding: 1rem 3rem; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">
                    Submit Answer
                </button>
            </div>
        </form>
        
        <div style="margin-top: 2rem; text-align: center;">
            <a href="{{ url_for('games') }}" style="color: var(--primary-blue); text-decoration: none;">
                <i class="fas fa-arrow-left"></i> Back to Games
            </a>
        </div>
    </div>
</div>

<style>
label:hover {
    background: var(--light-blue) !important;
    border-color: var(--primary-blue) !important;
}
</style>
{% endblock %}
